  name: Desktop Application Build Automation

  on:
    workflow_dispatch:
      inputs:
        domain_urls:
          description: 'Comma-separated domain URLs (e.g., demo.testpress.in, lmsdemo.testpress.in)'
          required: true
          type: string
        build_target:
          description: 'Build target'
          required: true
          type: choice
          options:
            - all
            - windows-exe
            - mac-dmg
            - windows-appx
          default: all

  jobs:
    parse:
      runs-on: ubuntu-latest
      outputs:
        matrix: ${{ steps.set-matrix.outputs.matrix }}
      steps:
        - id: set-matrix
          run: |
            DOMAINS=$(echo "${{ github.event.inputs.domain_urls }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R . | jq -s -c .)
            echo "matrix=$DOMAINS" >> $GITHUB_OUTPUT

    build:
      needs: parse
      strategy:
        matrix:
          domain_url: ${{ fromJson(needs.parse.outputs.matrix) }}
          os: [windows-latest, macos-latest]
        fail-fast: false
      runs-on: ${{ matrix.os }}
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: 'npm'

        - name: Install Dependencies
          run: npm ci

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.x'

        - name: Install CastLabs EVS
          run: python -m pip install --upgrade castlabs-evs

        - name: Sign Electron Package (CastLabs EVS)
          env:
            CASTLABS_EVS_USER: ${{ secrets.CASTLABS_EVS_USER }}
            CASTLABS_EVS_PASSWORD: ${{ secrets.CASTLABS_EVS_PASSWORD }}
          run: python -m castlabs_evs.vmp sign-pkg node_modules/electron/dist

        - name: Fetch Configuration for ${{ matrix.domain_url }}
          env:
            DESKTOP_BUILD_KEY: ${{ secrets.DESKTOP_BUILD_KEY }}
          run: node scripts/build-config.js ${{ matrix.domain_url }} ${{ github.event.inputs.build_target }} ${{ matrix.os }}

        - name: Build and Package (Windows EXE)
          if: matrix.os == 'windows-latest' && (github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'windows-exe')
          run: npm run dist:win
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Build and Package (Windows Appx)
          if: matrix.os == 'windows-latest' && (github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'windows-appx')
          run: npm run dist:appx
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Build and Package (macOS DMG)
          if: matrix.os == 'macos-latest' && (github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'mac-dmg')
          run: |
            npm run dist:mac-x64
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Zip Build Output (Windows)
          id: zip_win
          if: matrix.os == 'windows-latest'
          shell: pwsh
          run: |
            $SUBDOMAIN = "${{ matrix.domain_url }}".Split('.')[0]
            $ZIP_NAME = "testpress-$SUBDOMAIN-win.zip"
            Compress-Archive -Path release\* -DestinationPath $ZIP_NAME
            Add-Content -Path $env:GITHUB_OUTPUT -Value "ZIP_PATH=$ZIP_NAME"

        - name: Zip Build Output (macOS)
          id: zip_mac
          if: matrix.os == 'macos-latest'
          shell: bash
          run: |
            SUBDOMAIN=$(echo "${{ matrix.domain_url }}" | cut -d'.' -f1)
            ZIP_NAME="testpress-$SUBDOMAIN-mac.zip"
            zip -r "$ZIP_NAME" release/
            echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_OUTPUT

        - name: Set Unified Output
          id: zip
          shell: bash
          run: |
            echo "ZIP_PATH=${{ steps.zip_win.outputs.ZIP_PATH }}${{ steps.zip_mac.outputs.ZIP_PATH }}" >> $GITHUB_OUTPUT

        - name: Upload Artifacts
          uses: actions/upload-artifact@v4
          with:
            name: ${{ steps.zip.outputs.ZIP_PATH }}
            path: ${{ steps.zip.outputs.ZIP_PATH }}
