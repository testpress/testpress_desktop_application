name: Desktop Application Build Automation

on:
  workflow_dispatch:
    inputs:
      domain_urls:
        description: 'Comma-separated domain URLs (e.g., demo.testpress.in, lmsdemo.testpress.in)'
        required: true
        type: string
      build_target:
        description: 'Build target'
        required: true
        type: choice
        options:
          - all
          - windows-exe
          - mac-dmg
          - windows-appx
          - ubuntu-deb
          - linux-appimage
          - linux
        default: all

jobs:
  parse:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          DOMAINS=$(echo "${{ github.event.inputs.domain_urls }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R . | jq -s -c .)
          echo "matrix=$DOMAINS" >> $GITHUB_OUTPUT

  build:
    needs: parse
    strategy:
      matrix:
        domain_url: ${{ fromJson(needs.parse.outputs.matrix) }}
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check Supported OS
        id: check_os
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ] && [[ "${{ github.event.inputs.build_target }}" = "all" || "${{ github.event.inputs.build_target }}" == *"windows"* ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.os }}" = "macos-latest" ] && [[ "${{ github.event.inputs.build_target }}" = "all" || "${{ github.event.inputs.build_target }}" == *"mac"* ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ] && [[ "${{ github.event.inputs.build_target }}" = "all" || "${{ github.event.inputs.build_target }}" = "linux" || "${{ github.event.inputs.build_target }}" = "ubuntu-deb" || "${{ github.event.inputs.build_target }}" = "linux-appimage" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        if: steps.check_os.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check_os.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        if: steps.check_os.outputs.run == 'true'
        run: npm ci

      - name: Setup Python
        if: steps.check_os.outputs.run == 'true' && matrix.os != 'ubuntu-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install CastLabs EVS
        if: steps.check_os.outputs.run == 'true' && matrix.os != 'ubuntu-latest'
        run: python -m pip install castlabs-evs==1.3.2

      - name: Sign Electron Package (CastLabs EVS)
        if: steps.check_os.outputs.run == 'true' && matrix.os != 'ubuntu-latest'
        env:
          EVS_USER: ${{ secrets.CASTLABS_EVS_USER }}
          EVS_PASSWORD: ${{ secrets.CASTLABS_EVS_PASSWORD }}
        run: python -m castlabs_evs.vmp sign-pkg -A "${{ secrets.CASTLABS_EVS_USER }}" -P "${{ secrets.CASTLABS_EVS_PASSWORD }}" node_modules/electron/dist

      - name: Fetch Configuration for ${{ matrix.domain_url }}
        if: steps.check_os.outputs.run == 'true'
        env:
          DESKTOP_BUILD_KEY: ${{ secrets.DESKTOP_APP_CONFIG_API_ACCESS_KEY }}
        run: |
          node scripts/build-config.js ${{ matrix.domain_url }} ${{ github.event.inputs.build_target }} ${{ matrix.os }}

      - name: Build and Package (Windows EXE)
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'windows-latest' && (github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'windows-exe')
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Package (Windows Appx)
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'windows-latest' && (github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'windows-appx')
        run: npm run dist:appx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Package (Linux DEB and AppImage)
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'ubuntu-latest' && (github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'linux')
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Package (Ubuntu DEB)
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'ubuntu-latest' && github.event.inputs.build_target == 'ubuntu-deb'
        run: npm run dist:linux-deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Package (Linux AppImage)
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'ubuntu-latest' && github.event.inputs.build_target == 'linux-appimage'
        run: npm run dist:linux-appimage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install macOS signing certificate
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'macos-latest'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain login.keychain-db
          security default-keychain -s build.keychain

      - name: Setup Apple API Key
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'macos-latest'
        shell: bash
        run: |
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > AuthKey_JWX97Q39TN.p8

          echo "APPLE_API_KEY=$PWD/AuthKey_JWX97Q39TN.p8" >> $GITHUB_ENV
          echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> $GITHUB_ENV
          echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> $GITHUB_ENV

      - name: Build and Package (macOS x64 DMG)
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'macos-latest' && (github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'mac-dmg')
        run: |
          npm run dist:mac-x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVS_USER: ${{ secrets.CASTLABS_EVS_USER }}
          EVS_PASSWORD: ${{ secrets.CASTLABS_EVS_PASSWORD }}

      - name: Build and Package (macOS ARM DMG)
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'macos-latest' && (github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'mac-dmg')
        run: |
          npm run dist:mac-arm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVS_USER: ${{ secrets.CASTLABS_EVS_USER }}
          EVS_PASSWORD: ${{ secrets.CASTLABS_EVS_PASSWORD }}

      - name: Zip Build Output (Windows)
        id: zip_win
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $SUBDOMAIN = "${{ matrix.domain_url }}".Split('.')[0]
          $ZIP_NAME = "$SUBDOMAIN-win.zip"
          Compress-Archive -Path release\* -DestinationPath $ZIP_NAME
          Add-Content -Path $env:GITHUB_OUTPUT -Value "ZIP_PATH=$ZIP_NAME"

      - name: Zip Build Output (macOS)
        id: zip_mac
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'macos-latest'
        shell: bash
        run: |
          SUBDOMAIN=$(echo "${{ matrix.domain_url }}" | cut -d'.' -f1)
          ZIP_NAME="$SUBDOMAIN-mac.zip"
          find release/ -name '*.dmg' -print0 | xargs -0 zip "$ZIP_NAME"
          echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Zip Build Output (Linux)
        id: zip_linux
        if: steps.check_os.outputs.run == 'true' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          SUBDOMAIN=$(echo "${{ matrix.domain_url }}" | cut -d'.' -f1)
          ZIP_NAME="$SUBDOMAIN-linux.zip"
          BUILD_TARGET="${{ github.event.inputs.build_target }}"

          if [ "$BUILD_TARGET" = "ubuntu-deb" ]; then
            mapfile -d '' PACKAGE_FILES < <(find release -type f -name '*.deb' -print0)
          elif [ "$BUILD_TARGET" = "linux-appimage" ]; then
            mapfile -d '' PACKAGE_FILES < <(find release -type f -name '*.AppImage' -print0)
          else
            mapfile -d '' PACKAGE_FILES < <(find release -type f \( -name '*.deb' -o -name '*.AppImage' \) -print0)
          fi

          if [ "${#PACKAGE_FILES[@]}" -eq 0 ]; then
            echo "No Linux packages found for build target: $BUILD_TARGET" >&2
            exit 1
          fi

          zip -j "$ZIP_NAME" "${PACKAGE_FILES[@]}"
          echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Set Unified Output
        id: zip
        if: steps.check_os.outputs.run == 'true'
        shell: bash
        run: |
          echo "ZIP_PATH=${{ steps.zip_win.outputs.ZIP_PATH }}${{ steps.zip_mac.outputs.ZIP_PATH }}${{ steps.zip_linux.outputs.ZIP_PATH }}" >> $GITHUB_OUTPUT

      - name: Upload Artifacts
        if: steps.check_os.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.ZIP_PATH }}
          path: ${{ steps.zip.outputs.ZIP_PATH }}
