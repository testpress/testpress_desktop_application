name: ARM Build (macOS)

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

jobs:
  build:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/arm-build')
    runs-on: macos-latest
    steps:
      - name: Parse build parameters
        id: params
        run: |
          COMMENT="${{ github.event.comment.body }}"
          # Extract subdomain from comment: /arm-build [subdomain]
          SUBDOMAIN=$(echo "$COMMENT" | awk '{print $2}')
          if [ -z "$SUBDOMAIN" ]; then
            SUBDOMAIN="siddhiprep"
          fi
          DOMAIN_URL="${SUBDOMAIN}.testpress.in"
          echo "subdomain=$SUBDOMAIN" >> "$GITHUB_OUTPUT"
          echo "domain_url=$DOMAIN_URL" >> "$GITHUB_OUTPUT"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install CastLabs EVS
        run: python -m pip install castlabs-evs==1.3.2

      - name: Sign Electron Package (CastLabs EVS)
        env:
          EVS_USER: ${{ secrets.CASTLABS_EVS_USER }}
          EVS_PASSWORD: ${{ secrets.CASTLABS_EVS_PASSWORD }}
        run: python -m castlabs_evs.vmp sign-pkg -A "$EVS_USER" -P "$EVS_PASSWORD" node_modules/electron/dist

      - name: Fetch Configuration
        env:
          DESKTOP_BUILD_KEY: ${{ secrets.DESKTOP_APP_CONFIG_API_ACCESS_KEY }}
        run: node scripts/build-config.js ${{ steps.params.outputs.domain_url }} mac-dmg macos-latest

      - name: Install macOS signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain login.keychain-db
          security default-keychain -s build.keychain

      - name: Setup Apple API Key
        shell: bash
        run: |
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > AuthKey_JWX97Q39TN.p8
          echo "APPLE_API_KEY=$PWD/AuthKey_JWX97Q39TN.p8" >> $GITHUB_ENV
          echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> $GITHUB_ENV
          echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> $GITHUB_ENV

      - name: Build and Package (macOS ARM DMG)
        run: npm run dist:mac-arm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip Build Output
        id: zip
        run: |
          SUBDOMAIN="${{ steps.params.outputs.subdomain }}"
          ZIP_NAME="${SUBDOMAIN}-mac-arm.zip"
          zip -r "$ZIP_NAME" release/
          echo "ZIP_PATH=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.ZIP_PATH }}
          path: ${{ steps.zip.outputs.ZIP_PATH }}

      - name: Comment on PR with result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const jobStatus = '${{ job.status }}' === 'success' ? '✅ succeeded' : '❌ failed';
            const subdomain = '${{ steps.params.outputs.subdomain }}';
            const domainUrl = `https://${subdomain}.testpress.in`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body;
            if ('${{ job.status }}' === 'success') {
              const artifactName = '${{ steps.zip.outputs.ZIP_PATH }}';
              body = `### ARM Build ${jobStatus}\n\n` +
                     `- **Subdomain:** ${subdomain}\n` +
                     `- **Domain:** ${domainUrl}\n` +
                     `- **Architecture:** macOS ARM64\n\n` +
                     `📦 [Download artifact](${runUrl}) — look for \`${artifactName}\` in the artifacts section.`;
            } else {
              body = `### ARM Build ${jobStatus}\n\n` +
                     `- **Subdomain:** ${subdomain}\n\n` +
                     `🔗 [View workflow run](${runUrl}) for details.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
